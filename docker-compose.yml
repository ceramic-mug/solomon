services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: solomon
      POSTGRES_PASSWORD: solomon
      POSTGRES_DB: solomon
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solomon"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgres://solomon:solomon@postgres:5432/solomon?sslmode=disable
      JWT_SECRET: change-me-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
